<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoRa IoT Project Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;--text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--accent:#2563eb;--green:#16a34a;
  --green-bg:#dcfce7;--green-text:#14532d;--blue-bg:#dbeafe;--blue-text:#1e3a8a;
  --purple:#7c3aed;--purple-bg:#ede9fe;--purple-text:#3b0764;--orange:#ea580c;
  --warn-bg:#fef3c7;--warn-text:#78350f;--danger:#dc2626;--danger-bg:#fee2e2;--danger-text:#7f1d1d;
  --info-bg:#dbeafe;--info-text:#1e3a8a;--success-bg:#dcfce7;--success-text:#14532d;
  --radius:8px;--radius-lg:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0f0f0;--text2:#a0a0a0;--text3:#6b6b6b;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --green-bg:#052e16;--green-text:#86efac;--blue-bg:#0f172a;--blue-text:#93c5fd;
  --purple-bg:#1e1b4b;--purple-text:#c4b5fd;--warn-bg:#1c1007;--warn-text:#fcd34d;
  --danger-bg:#1f0707;--danger-text:#fca5a5;--info-bg:#0f172a;--info-text:#93c5fd;
  --success-bg:#052e16;--success-text:#86efac;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh;padding:1.25rem}
.app{max-width:980px;margin:0 auto;background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06)}

/* HEADER */
.header{padding:1.1rem 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.title-wrap{display:flex;flex-direction:column;gap:3px}
.title-main{font-size:16px;font-weight:500}
.title-sub{font-size:11px;color:var(--text2)}
.hdr-actions{display:flex;gap:6px;flex-wrap:wrap}

/* BUTTONS */
.btn{font-size:12px;padding:5px 11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:var(--font);white-space:nowrap}
.btn:hover{background:var(--bg2);color:var(--text)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.88}
.btn.danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.btn.success{background:var(--success-bg);color:var(--green);border-color:var(--green)}
.btn.sm{font-size:11px;padding:3px 8px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:7px;padding:.9rem 1.5rem;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.stat{background:var(--bg);border-radius:var(--radius);padding:.6rem .8rem;border:0.5px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-value{font-size:19px;font-weight:500;line-height:1.2}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:2px;transition:width .5s ease}

/* TABS */
.tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 1.5rem;overflow-x:auto}
.tab{padding:.6rem .9rem;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:var(--font);display:flex;align-items:center;gap:5px}
.tab:hover:not(.active){color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}

/* CONTENT */
.content{padding:1rem 1.5rem 2rem}

/* FILTER */
.filter-row{display:flex;gap:5px;margin-bottom:.9rem;flex-wrap:wrap;align-items:center}
.fbtn{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.fbtn:hover{color:var(--text)}
.fbtn.active{background:var(--text);color:var(--bg);border-color:transparent}
.fbtn.phase{border-radius:var(--radius)}
.spacer{flex:1}

/* PHASE EDITOR */
.phase-editor{margin-bottom:1.5rem;border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.phase-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;gap:.5rem}
.phase-title-input{font-size:14px;font-weight:500;border:none;background:transparent;color:inherit;width:120px;font-family:var(--font);outline:none;cursor:pointer}
.phase-title-input:focus{background:rgba(255,255,255,0.15);border-radius:4px;padding:0 4px}
.phase-actions{display:flex;gap:5px;align-items:center}

/* WEEK */
.week-wrap{border-top:0.5px solid var(--border)}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:.45rem .85rem;gap:.5rem}
.week-header-left{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0}
.week-label-input{font-size:12px;font-weight:500;border:none;background:transparent;color:inherit;width:70px;font-family:var(--font);outline:none;cursor:pointer}
.week-label-input:focus{background:var(--bg2);border-radius:4px;padding:0 4px}
.week-days-input{font-size:11px;border:none;background:transparent;color:var(--text2);width:100px;font-family:var(--font);outline:none;cursor:pointer}
.week-days-input:focus{background:var(--bg2);border-radius:4px;padding:0 4px}
.week-prog{font-size:11px;margin-left:.5rem;white-space:nowrap}
.week-actions{display:flex;gap:4px}
.task-list{padding:.4rem .85rem .6rem}

/* TASK */
.task{display:flex;align-items:flex-start;gap:9px;padding:.55rem .7rem;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:4px;transition:border-color .15s;position:relative}
.task:hover{border-color:var(--border2)}
.task.done{opacity:.58}
.task.done .task-text-input{text-decoration:line-through;color:var(--text2)}
.task.inprog{border-left:2px solid var(--accent)}
.check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:10px}
.check.checked{background:var(--green);border-color:var(--green);color:#fff}
.check.inp{background:var(--accent);border-color:var(--accent);color:#fff}
.task-body{flex:1;min-width:0}
.task-text-input{width:100%;font-size:13px;line-height:1.5;border:none;background:transparent;color:var(--text);font-family:var(--font);outline:none;resize:none;cursor:pointer;padding:0}
.task-text-input:focus{cursor:text;background:var(--bg2);border-radius:4px;padding:2px 6px}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;cursor:pointer;border:0.5px solid transparent}
.cat-select{font-size:10px;padding:2px 4px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:var(--font)}
.day-input{font-size:11px;color:var(--text3);border:none;background:transparent;font-family:var(--font);width:60px;outline:none;cursor:pointer}
.day-input:focus{background:var(--bg2);border-radius:4px;padding:0 4px;color:var(--text)}
.note-area{width:100%;font-size:12px;padding:.4rem .5rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);margin-top:6px;resize:vertical;display:none;font-family:var(--font);min-height:54px}
.note-area:focus{outline:none;border-color:var(--accent)}
.task.expanded .note-area{display:block}
.task-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task:hover .task-actions{opacity:1}

/* ADD BUTTONS */
.add-task-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);padding:.35rem .7rem;border:0.5px dashed var(--border2);border-radius:var(--radius);cursor:pointer;transition:all .15s;background:transparent;font-family:var(--font);width:100%;margin-top:2px}
.add-task-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--info-bg)}
.add-week-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);padding:.3rem .85rem;border-top:0.5px dashed var(--border2);cursor:pointer;transition:all .15s;background:transparent;font-family:var(--font);width:100%}
.add-week-btn:hover{color:var(--accent);background:var(--info-bg)}
.add-phase-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);padding:.65rem 1rem;border:0.5px dashed var(--border2);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s;background:transparent;font-family:var(--font);width:100%;margin-bottom:1rem;justify-content:center}
.add-phase-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--info-bg)}

/* MILESTONES */
.ms-item{display:flex;align-items:center;gap:9px;padding:.6rem .8rem;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:4px}
.ms-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ms-label{flex:1;font-size:13px}
.ms-label.achieved{text-decoration:line-through;color:var(--text2)}

/* LOG */
.log-item{padding:.5rem .8rem;border-left:2px solid var(--border2);margin-bottom:.3rem}
.log-item:hover{border-left-color:var(--accent)}
.log-time{font-size:11px;color:var(--text3);margin-bottom:1px}
.log-text{font-size:13px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:1.5rem;max-width:480px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:.75rem}
.modal input,.modal select,.modal textarea{width:100%;font-size:13px;padding:.45rem .65rem;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:var(--font)}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch.selected{border-color:var(--text);transform:scale(1.15)}

/* IMPORT/EXPORT */
.io-zone{padding:.75rem;background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--radius);font-size:12px;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.io-zone:hover{border-color:var(--accent);color:var(--accent)}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:.6rem;color:var(--text3)}

/* FOOTER */
.footer{padding:.6rem 1.5rem;border-top:0.5px solid var(--border);background:var(--bg2);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;align-items:center}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:600px){body{padding:.5rem}.stats{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="title-wrap">
      <span class="title-main"><i class="ti ti-circuit-board" style="margin-right:5px;font-size:15px;vertical-align:-2px"></i>LoRa IoT Project Tracker</span>
      <span class="title-sub">Chỉnh sửa trực tiếp · Lưu tự động · Xuất/nhập JSON</span>
    </div>
    <div class="hdr-actions">
      <button class="btn" onclick="importJSON()"><i class="ti ti-upload" style="font-size:12px"></i> Nhập JSON</button>
      <button class="btn" onclick="exportJSON()"><i class="ti ti-download" style="font-size:12px"></i> Xuất JSON</button>
      <button class="btn" onclick="exportTXT()"><i class="ti ti-file-text" style="font-size:12px"></i> Xuất TXT</button>
      <button class="btn danger" onclick="resetAll()"><i class="ti ti-refresh" style="font-size:12px"></i> Reset</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks',this)"><i class="ti ti-checklist" style="font-size:13px"></i> Công việc</button>
    <button class="tab" onclick="switchTab('milestones',this)"><i class="ti ti-flag" style="font-size:13px"></i> Milestones</button>
    <button class="tab" onclick="switchTab('log',this)"><i class="ti ti-history" style="font-size:13px"></i> Nhật ký</button>
    <button class="tab" onclick="switchTab('io',this)"><i class="ti ti-settings" style="font-size:13px"></i> Cài đặt</button>
  </div>

  <div class="content" id="content"></div>
  <div class="footer"><span>Click task để đổi trạng thái · Double-click text để sửa · Hover để thấy nút thêm/xóa</span><span id="saved-at"></span></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const STORE = 'lora_tracker_v4';
const COLORS = ['#16A34A','#2563EB','#7C3AED','#EA580C','#0891B2','#DC2626','#D97706','#0D9488'];
const CAT_OPTS = ['OS','Hardware','Code','Infra','Firmware','Data','ML','Test','Doc'];
const CAT_CLS = {OS:'badge-blue',Hardware:'badge-orange',Code:'badge-green',Infra:'badge-blue',Firmware:'badge-orange',Data:'badge-purple',ML:'badge-purple',Test:'badge-gray',Doc:'badge-gray'};

function uid(){ return '_'+Math.random().toString(36).slice(2,9); }

function defaultData(){
  return {
    phases:[
      {id:'m1',label:'Tháng 1',color:'#16A34A',weeks:[
        {id:'w1',label:'Tuần 1',days:'Ngày 1–7',tasks:[
          {id:'t101',text:'Cài Raspberry Pi OS Lite 64-bit, cấu hình headless SSH + WiFi',day:'1',cat:'OS'},
          {id:'t102',text:'apt update/upgrade, bật SPI/I2C, cài Python pip git tmux htop',day:'2',cat:'OS'},
          {id:'t103',text:'Wiring SX1276 → Pi 5, cài spidev RPi.GPIO pyLoRa, test REG_VERSION=0x12',day:'3',cat:'Hardware'},
          {id:'t104',text:'Viết lora_rx_basic.py — decode wire format comm_manager.h, verify CRC-16',day:'4',cat:'Code'},
          {id:'t105',text:'Cài Docker, InfluxDB 2.x, Grafana — tạo bucket lora_data retention=90d',day:'5-6',cat:'Infra'},

        ]},
        {id:'w2',label:'Tuần 2',days:'Ngày 8–14',tasks:[

      ]},
      {id:'m2',label:'Tháng 2',color:'#2563EB',weeks:[
        {id:'w5',label:'Tuần 5',days:'Ngày 1–7',tasks:[

      ]},

          {id:'t307',text:'Midpoint review — tổng hợp số liệu, gap analysis, draft abstract 250 words',day:'14',cat:'Doc'},

let D = defaultData();
let activeTab = 'tasks';
let activePhase = 'all';
let activeFilter = 'all';

function load(){
  try{
    const raw = localStorage.getItem(STORE);
    if(raw){ const d=JSON.parse(raw); if(d.phases){ D=d; } }
  }catch(e){}
}

function save(){
  try{
    localStorage.setItem(STORE, JSON.stringify(D));
    const el=document.getElementById('saved-at');
    if(el) el.textContent='Lưu lúc '+new Date().toLocaleTimeString('vi-VN');
  }catch(e){}
}

function allTasks(){ return D.phases.flatMap(p=>p.weeks.flatMap(w=>w.tasks)); }
function taskStatus(id){ return D.status[id]||'todo'; }

function cycleStatus(id){
  const cur=taskStatus(id);
  const next=cur==='todo'?'in-progress':cur==='in-progress'?'done':'todo';
  D.status[id]=next;
  const task=allTasks().find(t=>t.id===id);
  const label=next==='done'?'✓ Hoàn thành':next==='in-progress'?'▶ Đang làm':'↩ Đặt lại';
  D.log.unshift({time:new Date().toLocaleString('vi-VN'),action:label,task:(task?.text||'').slice(0,70)});
  if(D.log.length>300) D.log.pop();
  save(); renderAll();
}

// ─── STATS ───────────────────────────────────────────────────
function renderStats(){
  const all=allTasks();
  const done=all.filter(t=>D.status[t.id]==='done').length;
  const inp=all.filter(t=>D.status[t.id]==='in-progress').length;
  const pct=all.length?Math.round(done/all.length*100):0;
  let h=`
    <div class="stat"><div class="stat-label">Tổng tiến độ</div><div class="stat-value">${pct}%</div><div class="pbar"><div class="pfill" style="width:${pct}%;background:var(--accent)"></div></div></div>
    <div class="stat"><div class="stat-label">Hoàn thành</div><div class="stat-value" style="color:var(--green)">${done}</div><div class="stat-sub">${inp} đang làm · ${all.length-done-inp} chờ</div></div>`;
  D.phases.forEach(p=>{
    const pt=p.weeks.flatMap(w=>w.tasks);
    const pd=pt.filter(t=>D.status[t.id]==='done').length;
    const pp=pt.length?Math.round(pd/pt.length*100):0;
    h+=`<div class="stat"><div class="stat-label">${p.label}</div><div class="stat-value" style="font-size:15px;color:${p.color}">${pd}<span style="font-size:12px;color:var(--text3)">/${pt.length}</span></div><div class="pbar"><div class="pfill" style="width:${pp}%;background:${p.color}"></div></div></div>`;
  });
  document.getElementById('stats').innerHTML=h;
}

  h+=`<span class="spacer"></span>`;
  [['all','Tất cả'],['todo','Chưa làm'],['in-progress','Đang làm'],['done','Xong']].forEach(([f,l])=>{

  const phases = activePhase==='all' ? D.phases : D.phases.filter(p=>p.id===activePhase);

    phase.weeks.forEach(week=>{

      });
      const wdone=week.tasks.filter(t=>D.status[t.id]==='done').length;
      const wpct=week.tasks.length?Math.round(wdone/week.tasks.length*100):0;

        h+=`<div style="font-size:12px;color:var(--text3);padding:.3rem 0">Không có task nào phù hợp bộ lọc</div>`;
      }

      filtered.forEach(t=>{
        const ts=taskStatus(t.id);

        const chkIcon=ts==='done'?'<i class="ti ti-check" style="font-size:10px"></i>':ts==='in-progress'?'<i class="ti ti-player-play" style="font-size:10px"></i>':'';

  c.innerHTML=h;

// ─── EDIT FUNCTIONS ──────────────────────────────────────────
function editPhaseLabel(pid, val){
  const p=D.phases.find(x=>x.id===pid); if(p){ p.label=val; save(); renderStats(); }
}
function editWeekLabel(pid,wid,val){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid); if(w){ w.label=val; save(); }
}
function editWeekDays(pid,wid,val){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid); if(w){ w.days=val; save(); }
}
function editTaskText(pid,wid,tid,val){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid); const t=w?.tasks.find(x=>x.id===tid);
  if(t){ t.text=val; save(); }
}
function editTaskCat(pid,wid,tid,val){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid); const t=w?.tasks.find(x=>x.id===tid);
  if(t){ t.cat=val; save(); renderTasks(); }
}
function editTaskDay(pid,wid,tid,val){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid); const t=w?.tasks.find(x=>x.id===tid);
  if(t){ t.day=val; save(); }
}
function saveNote(tid,val){ D.notes[tid]=val; save(); }
function toggleNote(e,taskId){ e.stopPropagation(); document.getElementById(taskId)?.classList.toggle('expanded'); }

// ─── ADD / DELETE ─────────────────────────────────────────────
function addTask(pid,wid){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid);
  if(w){ w.tasks.push({id:uid(),text:'Task mới — click để sửa',day:'?',cat:'Code'}); save(); renderAll(); }
}
function deleteTask(pid,wid,tid){
  const p=D.phases.find(x=>x.id===pid); const w=p?.weeks.find(x=>x.id===wid);
  if(w){ w.tasks=w.tasks.filter(t=>t.id!==tid); delete D.status[tid]; delete D.notes[tid]; save(); renderAll(); }
}
function addWeek(pid,afterWid){
  const p=D.phases.find(x=>x.id===pid); if(!p) return;
  const nw={id:uid(),label:'Tuần mới',days:'Ngày ?',tasks:[]};
  const idx=p.weeks.findIndex(w=>w.id===afterWid);
  p.weeks.splice(idx+1,0,nw); save(); renderAll();
}
function addWeekToPhase(pid){
  const p=D.phases.find(x=>x.id===pid); if(!p) return;
  p.weeks.push({id:uid(),label:'Tuần mới',days:'Ngày ?',tasks:[]}); save(); renderAll();
}
function deleteWeek(pid,wid){
  if(!confirm('Xóa tuần này và tất cả task bên trong?')) return;
  const p=D.phases.find(x=>x.id===pid); if(!p) return;
  const w=p.weeks.find(x=>x.id===wid);
  if(w) w.tasks.forEach(t=>{ delete D.status[t.id]; delete D.notes[t.id]; });
  p.weeks=p.weeks.filter(w=>w.id!==wid); save(); renderAll();
}
function addPhase(mode, afterId){
  const np={id:uid(),label:'Phase mới',color:'#0891B2',weeks:[{id:uid(),label:'Tuần 1',days:'Ngày 1–7',tasks:[]}]};
  if(mode==='after'&&afterId){ const idx=D.phases.findIndex(p=>p.id===afterId); D.phases.splice(idx+1,0,np); }
  else D.phases.push(np);
  save(); renderAll(); showPhaseModal(np.id);
}
function deletePhase(pid){
  if(!confirm('Xóa phase này và toàn bộ dữ liệu bên trong?')) return;
  const p=D.phases.find(x=>x.id===pid);
  if(p) p.weeks.forEach(w=>w.tasks.forEach(t=>{ delete D.status[t.id]; delete D.notes[t.id]; }));
  D.phases=D.phases.filter(p=>p.id!==pid);
  if(activePhase===pid) activePhase='all';
  save(); renderAll();
}

// ─── IMPORT / EXPORT ─────────────────────────────────────────
function exportJSON(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`lora_tracker_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importJSON(){ document.getElementById('file-input').click(); }
function handleImport(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.phases) throw new Error('Invalid format');
      if(!confirm('Nhập JSON sẽ ghi đè dữ liệu hiện tại. Tiếp tục?')) return;
      D=d; save(); renderAll(); alert('Nhập thành công!');
    }catch(err){ alert('File JSON không hợp lệ: '+err.message); }
  };
  r.readAsText(f); e.target.value='';
}
function exportTXT(){
  const lines=['LoRa IoT Project — Báo cáo tiến độ','='.repeat(50),`Xuất lúc: ${new Date().toLocaleString('vi-VN')}`,''];
  D.phases.forEach(ph=>{
    lines.push(`[${ph.label}]`);
    ph.weeks.forEach(wk=>{
      lines.push(`  ${wk.label} — ${wk.days}`);
      wk.tasks.forEach(t=>{
        const ts=D.status[t.id]||'todo';
        lines.push(`    [${ts==='done'?'X':ts==='in-progress'?'>':' '}] [${t.cat}] ${t.text.replace(/\n/g,' ')}`);
        if(D.notes[t.id]) lines.push(`        Ghi chú: ${D.notes[t.id]}`);
      });
    });
    lines.push('');
  });
  const all=allTasks();
  const done=all.filter(t=>D.status[t.id]==='done').length;
  lines.push('── Thống kê ──',`Tổng: ${all.length} task`,`Hoàn thành: ${done} (${all.length?Math.round(done/all.length*100):0}%)`,`Đang làm: ${all.filter(t=>D.status[t.id]==='in-progress').length}`,'');
  if(D.log.length){ lines.push('── Nhật ký ──'); D.log.forEach(e=>lines.push(`${e.time} | ${e.action} | ${e.task}`)); }
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`lora_progress_${new Date().toISOString().slice(0,10)}.txt`; a.click();
}

// ─── HELPERS ─────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function autoResize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function clearLog(){ if(confirm('Xóa toàn bộ nhật ký?')){ D.log=[]; save(); renderLog(); } }
function resetAll(){
  if(confirm('Reset toàn bộ? Hành động này không thể hoàn tác.\n\nHãy xuất JSON backup trước nếu cần.')){
    D=defaultData(); save(); renderAll();
  }
}
function switchTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}
function setPhase(id){ activePhase=id; renderTasks(); }
function setFilter(f){ activeFilter=f; renderTasks(); }

function renderAll(){
  renderStats();
  if(activeTab==='tasks') renderTasks();
  else if(activeTab==='milestones') renderMilestones();
  else if(activeTab==='log') renderLog();
  else renderIO();
}

load(); renderAll();
</script>
</body>
